name: server

on:
  workflow_dispatch:
  push:
    tags:
      - "server-v*"

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/server" >> "$GITHUB_ENV"

      - name: Resolve build injection
        run: |
          echo "OV_SERVER_KEY_ID=$(cat agent/packaging/public/server_key_id.txt)" >> "$GITHUB_ENV"
          echo "OV_SERVER_PUBLIC_KEY_FINGERPRINT=$(cat agent/packaging/public/server_public_key_fingerprint.txt)" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: server/go.sum

      - name: Test server
        working-directory: server
        run: go test ./...

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=manual-${{ github.run_number }},enable=${{ github.ref_type != 'tag' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/server-v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            SERVER_KEY_ID=${{ env.OV_SERVER_KEY_ID }}
            SERVER_PUBLIC_KEY_FINGERPRINT=${{ env.OV_SERVER_PUBLIC_KEY_FINGERPRINT }}

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/server-v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          cat > release-notes.md <<EOF
          ov-computeruse server ${GITHUB_REF_NAME}

          Docker images:

          - ${IMAGE_NAME}:${GITHUB_REF_NAME}
          - ${IMAGE_NAME}:latest

          The GitHub source archives are generated automatically by GitHub. Deploy the Docker image above.
          EOF
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
